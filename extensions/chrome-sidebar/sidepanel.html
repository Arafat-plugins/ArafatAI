<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AQL AI</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="brand-logo" src="assets/aql-brain.png" alt="" aria-hidden="true">
      <div>
        <strong>AQL AI</strong>
        <span id="status">Ready</span>
      </div>
    </div>
  </header>

  <main id="thread" class="thread" aria-live="polite">
    <article class="message assistant">
      <span>AQL AI</span>
      <p>Hi. Ask me anything.</p>
    </article>
  </main>

  <footer class="composer">
    <textarea id="message" rows="3" placeholder="Message AQL AI"></textarea>
    <button id="send" type="button">Send</button>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
